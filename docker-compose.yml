version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: catalog_service_db
    environment:
      POSTGRES_DB: catalog_service
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d catalog_service"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
